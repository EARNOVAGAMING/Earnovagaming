<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Block Not Found | Earnova</title>
<link rel="icon" type="image/jpg" href="/logo.jpg">
<link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f; --card:#1a1a26; --border:#2a2a40;
  --accent:#f0c040; --accent2:#40e0a0; --pro:#a060ff;
  --text:#f0f0ff; --muted:#7070a0; --danger:#ff4060;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Bai Jamjuree',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}

/* Grid background */
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(240,192,64,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(240,192,64,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}

/* Animated canvas background */
#bgCanvas{position:fixed;inset:0;pointer-events:none;opacity:0.4;}

.container{position:relative;z-index:2;text-align:center;padding:32px 24px;max-width:500px;width:100%;}

/* 404 big number */
.error-num{font-family:'Space Mono',monospace;font-size:8rem;font-weight:700;line-height:1;letter-spacing:-4px;background:linear-gradient(135deg,var(--accent),var(--pro),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:pulse 2s ease-in-out infinite;}

@keyframes pulse{0%,100%{filter:brightness(1);}50%{filter:brightness(1.3);}}

/* Paddle and ball animation */
.game-visual{position:relative;width:280px;height:80px;margin:0 auto 24px;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.game-visual::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:20px 20px;}

/* Broken blocks */
.blocks-row{display:flex;gap:4px;justify-content:center;padding:10px 10px 0;flex-wrap:wrap;}
.block{height:10px;border-radius:2px;animation:blockFade 1.5s ease-in-out infinite;}
.block:nth-child(1){width:36px;background:#e040a0;animation-delay:0s;}
.block:nth-child(2){width:36px;background:#f0c040;opacity:0.3;animation-delay:0.2s;}
.block:nth-child(3){width:36px;background:#40e0a0;animation-delay:0.4s;}
.block:nth-child(4){width:36px;background:#4080f0;opacity:0.2;animation-delay:0.1s;}
.block:nth-child(5){width:36px;background:#e06040;animation-delay:0.6s;}
.block:nth-child(6){width:36px;background:#a060ff;opacity:0.15;animation-delay:0.3s;}
.block:nth-child(7){width:36px;background:#f0c040;animation-delay:0.5s;}

@keyframes blockFade{0%,100%{opacity:1;}50%{opacity:0.2;}}

/* Animated ball */
.ball{width:10px;height:10px;border-radius:50%;background:var(--accent2);position:absolute;box-shadow:0 0 10px var(--accent2);animation:bounceBall 1.8s ease-in-out infinite;}

@keyframes bounceBall{
  0%{left:20px;top:50px;}
  25%{left:140px;top:20px;}
  50%{left:240px;top:45px;}
  75%{left:140px;top:60px;}
  100%{left:20px;top:50px;}
}

/* Paddle */
.paddle{width:60px;height:7px;background:linear-gradient(90deg,var(--accent),#c09000);border-radius:4px;position:absolute;bottom:8px;left:50%;transform:translateX(-50%);animation:paddleMove 1.8s ease-in-out infinite;}

@keyframes paddleMove{
  0%{left:25%;}
  25%{left:50%;}
  50%{left:75%;}
  75%{left:50%;}
  100%{left:25%;}
}

.title{font-size:1.6rem;font-weight:700;margin-bottom:8px;}
.title span{color:var(--accent);}
.subtitle{font-size:0.88rem;color:var(--muted);line-height:1.7;margin-bottom:28px;}

/* Score display */
.score-display{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 20px;margin-bottom:24px;display:inline-flex;gap:24px;align-items:center;}
.score-item{text-align:center;}
.score-label{font-size:0.6rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:4px;}
.score-val{font-family:'Space Mono',monospace;font-size:1rem;font-weight:700;}
.score-val.gold{color:var(--accent);}
.score-val.green{color:var(--accent2);}
.score-val.red{color:var(--danger);}

.btn-home{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#0a0a0f;border:none;border-radius:10px;padding:13px 28px;font-family:'Bai Jamjuree',sans-serif;font-weight:700;font-size:0.95rem;cursor:pointer;text-decoration:none;transition:all 0.2s;margin-right:10px;}
.btn-home:hover{background:#ffd060;transform:translateY(-2px);}

.btn-back{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:10px;padding:13px 24px;font-family:'Bai Jamjuree',sans-serif;font-weight:600;font-size:0.88rem;cursor:pointer;text-decoration:none;transition:all 0.2s;}
.btn-back:hover{border-color:var(--accent);color:var(--accent);}

.logo{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:20px;opacity:0.6;}
.logo span{color:var(--accent);}

/* Particles */
.particle{position:fixed;pointer-events:none;border-radius:3px;animation:fall linear infinite;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(360deg);opacity:0;}}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="container">
  <div class="logo">Earn<span>ova</span></div>

  <div class="error-num">404</div>

  <div class="game-visual">
    <div class="blocks-row">
      <div class="block"></div>
      <div class="block"></div>
      <div class="block"></div>
      <div class="block"></div>
      <div class="block"></div>
      <div class="block"></div>
      <div class="block"></div>
    </div>
    <div class="ball"></div>
    <div class="paddle"></div>
  </div>

  <div class="title">Block <span>Not Found!</span></div>
  <div class="subtitle">Looks like this page got destroyed by the ball. 💥<br>Don't worry — your points are safe!</div>

  <div class="score-display">
    <div class="score-item">
      <div class="score-label">Error Code</div>
      <div class="score-val red">404</div>
    </div>
    <div class="score-item">
      <div class="score-label">Pages Lost</div>
      <div class="score-val gold">1</div>
    </div>
    <div class="score-item">
      <div class="score-label">Your Points</div>
      <div class="score-val green">SAFE ✓</div>
    </div>
  </div>

  <div>
    <a href="https://earnovagaming.online" class="btn-home">🎮 Back to Game</a>
    <a href="javascript:history.back()" class="btn-back">← Go Back</a>
  </div>
</div>

<script>
// Background canvas animation
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const colors = ['#f0c040','#40e0a0','#e040a0','#4080f0','#a060ff'];
const blocks = Array.from({length: 25}, () => ({
  x: Math.random() * window.innerWidth,
  y: Math.random() * window.innerHeight - window.innerHeight,
  w: 40 + Math.random() * 30,
  h: 14 + Math.random() * 6,
  color: colors[Math.floor(Math.random() * colors.length)],
  vy: 0.3 + Math.random() * 0.5,
  alpha: 0.08 + Math.random() * 0.15
}));

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  blocks.forEach(b => {
    b.y += b.vy;
    if (b.y > canvas.height + 20) {
      b.y = -20;
      b.x = Math.random() * canvas.width;
    }
    ctx.globalAlpha = b.alpha;
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.roundRect(b.x, b.y, b.w, b.h, 3);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
  requestAnimationFrame(animate);
}
animate();

// Spawn particles
function spawnParticle() {
  const p = document.createElement('div');
  p.className = 'particle';
  const size = 4 + Math.random() * 8;
  const color = colors[Math.floor(Math.random() * colors.length)];
  p.style.cssText = `
    width:${size}px;height:${size}px;
    background:${color};
    left:${Math.random()*100}vw;
    top:-20px;
    opacity:${0.3 + Math.random()*0.4};
    animation-duration:${4+Math.random()*6}s;
    animation-delay:${Math.random()*3}s;
  `;
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 10000);
}

setInterval(spawnParticle, 600);
</script>
</body>
</html>
